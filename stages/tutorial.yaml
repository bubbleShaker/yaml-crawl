name: はじまりの部屋
legend:
  "#": wall
  ".": floor
  "@": start
  "G": goal
map: |
  #######
  #@....#
  #.###.#
  #....G#
  #######
# --- で区切ると YAML の「複数ドキュメント」になり、1 ファイルに複数ステージを収録できる。
# 注意: アンカー(&)/エイリアス(*) は 1 ドキュメント内でのみ有効で、--- をまたいでは共有できない。
# そのため legend は各ステージに書く（テンプレ共通化は M5 でドキュメント内アンカーとして扱う）。
---
name: まがりみち
legend:
  "#": wall
  ".": floor
  "@": start
  "G": goal
map: |
  #########
  #@..#...#
  ###.#.#.#
  #...#.#.#
  #.###.#.#
  #.....#G#
  #########
